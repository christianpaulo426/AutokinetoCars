<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Autokineto | Brands</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body{
    background:#f8f9fa;
    color:#333;
}

nav{
    background: #dbdbdb;
    padding:20px 0;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

nav ul{
    list-style:none;
}

nav ul li{
    display:inline-block;
    margin:0 25px;
}

nav ul li a{
    text-decoration:none;
    color:#333;
    font-size:17px;
    font-weight:500;
    position:relative;
    transition:0.3s ease;
}

nav ul li a:hover{
    color:#888;
}

nav ul li a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-6px;
    width:0%;
    height:2px;
    background:#333;
    transition:0.3s ease;
}

nav ul li a:hover::after{
    width:100%;
}

.search-container{
    width:88%;
    margin:40px auto 10px auto;
}

.search-container input{
    width:280px;
    padding:10px 15px;
    border-radius:25px;
    border:1px solid #ddd;
    background:#ffffff;
    outline:none;
    transition:0.3s ease;
}

.search-container input:focus{
    border-color:#aaa;
    box-shadow:0 0 8px rgba(0,0,0,0.05);
}

.brands{
    width:88%;
    margin:30px auto 100px auto;
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:25px;
}

.brand-card{
    background:#ffffff;
    border-radius:12px;
    text-align:center;
    padding:30px 15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.04);
    transition:0.3s ease;
}

.brand-card img{
    max-width:120px;
    height:auto;
    margin-bottom:15px;
}

.brand-card h3{
    font-size:14px;
    font-weight:600;
    color:#444;
}

.brand-card:hover{
    transform:translateY(-6px);
    box-shadow:0 10px 20px rgba(0,0,0,0.06);
}

@media(max-width:1024px){
    .brands{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:600px){
    .brands{
        grid-template-columns:1fr;
    }
}

</style>
</head>
<body>

<nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="">Brands</a></li>
        <li><a href="about us.html">About Us</a></li>
    </ul>
</nav>

<div class="search-container">
    <input type="text" placeholder="Search car...">
</div>

<section class="brands">

    <div class="brand-card">
        <img src="n.jpg" alt="Hyundai">
        <h3>Hyundai Motor Company & Kia</h3>
    </div>

    <div class="brand-card">
        <img src="p.jpeg" alt="Ford">
        <h3>Ford Motor Company</h3>
    </div>

    <div class="brand-card">
        <img src="o.png" alt="Volkswagen">
        <h3>Volkswagen AG</h3>
    </div>

    <div class="brand-card">
        <img src="q.jpeg" alt="Chevrolet">
        <h3>Chevrolet</h3>
    </div>

    <div class="brand-card">
        <img src="r.jpg" alt="Lexus">
        <h3>Lexus</h3>
    </div>

    <div class="brand-card">
        <img src="s.png" alt="Acura">
        <h3>Acura</h3>
    </div>

    <div class="brand-card">
        <img src="t.jpg" alt="BMW">
        <h3>BMW</h3>
    </div>

    <div class="brand-card">
        <img src="m.jpg" alt="Mitsubishi">
        <h3>Mitsubishi Motors Corporation</h3>
    </div>

    <div class="brand-card">
        <img src="l.jpg" alt="Subaru">
        <h3>Subaru Corporation</h3>
    </div>

    <div class="brand-card">
        <img src="k.jpg" alt="Mazda">
        <h3>Mazda Motor Corporation</h3>
    </div>

    <div class="brand-card">
        <img src="j.png" alt="Honda">
        <h3>Honda Motor Co., Ltd</h3>
    </div>

    <div class="brand-card">
        <img src="i.png" alt="Toyota">
        <h3>Toyota Motor Corporation</h3>
    </div>
</section>

</body>
</html>
